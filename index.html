<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="logo">D</div>
      <button title="الرئيسية">🏠</button>
      <button title="المستخدمون">👥</button>
      <button title="المنتجات">📦</button>
      <button title="الإحصائيات">📊</button>
      <button title="المهام">✏️</button>
      <button title="المفضلة">⭐</button>
      <button class="logout" title="تسجيل الخروج">⏻</button>
    </aside>

    <main class="main">
      <section class="topbar">
        <div class="section-title"><span>لوحة التحكم</span></div>
        <div class="card">
          <div class="icon">👤</div>
          <h3>المستخدمين</h3>
          <p>255</p>
        </div>
        <div class="card">
          <div class="icon">✏️</div>
          <h3>المشاركات</h3>
          <p>80</p>
        </div>
        <div class="card">
          <div class="icon">📋</div>
          <h3>المنتجات</h3>
          <p>100</p>
        </div>
        <div class="card">
          <div class="icon">💲</div>
          <h3>الإيرادات</h3>
          <p>$1255</p>
        </div>
      </section>

      <section class="table-card">
        <div class="table-header">
          <div class="section-title"><span>المنتجات</span></div>
        </div>
        <table class="product-table">
          <thead>
            <tr>
              <th>المنتج</th>
              <th>السعر</th>
              <th>الكمية</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>حاسوب محمول</td><td><span class="badge green">$15020</span></td><td><span class="badge yellow">420</span></td></tr>
            <tr><td>تابلت</td><td><span class="badge green">$1355</span></td><td><span class="badge yellow">600</span></td></tr>
            <tr><td>هاتف محمول</td><td><span class="badge green">$1240</span></td><td><span class="badge yellow">200</span></td></tr>
            <tr><td>فأرة</td><td><span class="badge green">$500</span></td><td><span class="badge yellow">243</span></td></tr>
            <tr><td>حاسوب محمول</td><td><span class="badge green">$15020</span></td><td><span class="badge yellow">420</span></td></tr>
            <tr><td>حاسوب محمول</td><td><span class="badge green">$15020</span></td><td><span class="badge yellow">420</span></td></tr>
            <tr><td>حاسوب محمول</td><td><span class="badge green">$15020</span></td><td><span class="badge yellow">420</span></td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</body>
</html>
